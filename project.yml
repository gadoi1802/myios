name: DeviceUtility
options:
  bundleIdPrefix: com.antigravity
targets:
  DeviceUtility:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - Sources
      - Resources
    settings:
      base:
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        DEVELOPMENT_TEAM: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
        AD_HOC_CODE_SIGNING_ALLOWED: YES
      configs:
        Release:
          VALIDATE_PRODUCT: NO
