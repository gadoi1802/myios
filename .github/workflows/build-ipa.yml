name: Build Unsigned IPA
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build iOS Application
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Xcode Version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -project DeviceUtility.xcodeproj \
            -scheme DeviceUtility \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            archive \
            -archivePath build/DeviceUtility.xcarchive

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/DeviceUtility.xcarchive/Products/Applications/DeviceUtility.app build/Payload/
          cd build
          zip -r DeviceUtility.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeviceUtility-IPA
          path: build/DeviceUtility.ipa
